name: CI

on:
  push:
  pull_request:

jobs:
  curl-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: id
        run: |
          hostname && date && id && ps && ip addr

      - name: docker ps
        run: |
          docker ps

      - name: ls
        run: |
          ls -la / /proc /home /root /tmp /run /run/docker /run/packer || echo

      - name: docker run
        run: |
          docker run alpine ls /

      - name: docker run privileged
        run: |
          docker run --network=host --privileged alpine ls /
